version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./backend:/app
      - duckdb_data:/data
    environment:
      DUCKDB_PATH: /data/resiliencia.duckdb
    depends_on: [redis]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on: [api]

volumes:
  duckdb_data:
