[build]
  publish = "."
  functions = "netlify/functions"

# SPA catch-all: rewrite all routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers for all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;"

# Never cache the SPA shell
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
